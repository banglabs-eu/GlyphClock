<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="currentTimeTitle">GlyphClock</title>
  <meta name="description" content="See the current GlyphClock — a universal, timezone-free time shown as symbols.">
  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){try{var d=localStorage.getItem('darkMode');if(d==='true'||(d===null&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}})()</script>
</head>
<body data-page="glyphclock">
  <h2 id="currentTime"></h2>
  <p style="font-size: 40px; text-align: center">🥐➳🦋➳🌷➳☂️➳🌵➳🎈➳👓➳⚓➳🦚➳🤖➳⭐➳☁️➳🌲➳🪁➳🪑➳♻➳</p>
  <script src="scripts.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
