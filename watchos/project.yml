name: GlyphClock
options:
  bundleIdPrefix: eu.bang-labs.glyphclock
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "15.0"

targets:
  GlyphClock Watch App:
    type: application
    platform: watchOS
    sources:
      - path: GlyphClock Watch App
      - path: GlyphClock Widget/GlyphClockModel.swift
    settings:
      INFOPLIST_KEY_CFBundleDisplayName: GlyphClock
      INFOPLIST_KEY_WKWatchOnly: true
      GENERATE_INFOPLIST_FILE: true
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.bang-labs.glyphclock.watchapp
    dependencies:
      - target: GlyphClock WidgetExtension

  GlyphClock WidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: GlyphClock Widget
    info:
      path: GlyphClock Widget/Info.plist
      properties:
        CFBundleDisplayName: GlyphClock Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      GENERATE_INFOPLIST_FILE: false
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.bang-labs.glyphclock.watchapp.widget
